<!DOCTYPE html>
<html>
<head>
    <title>Movie Assistant</title>
    <style>
        body { font-family: Arial; margin: 2rem; }
        #login, #search { margin-bottom: 2rem; border: 1px solid #ccc; padding: 1rem; }
        .movie-item { border-bottom: 1px solid #eee; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <h1>Movie/Series Assistant</h1>
    <div id="login">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="username">
        <input type="password" id="password" placeholder="password">
        <button onclick="login()">Login/Register</button>
        <span id="login_status"></span>
    </div>
    <div id="search" style="display:none;">
        <h2>Search</h2>
        <input type="text" id="search_input" placeholder="Search by title">
        <select id="type_filter"><option value="">All</option><option>Movie</option><option>TV Show</option></select>
        <input type="text" id="category" placeholder="Category">
        <input type="text" id="rating" placeholder="Rating">
        <input type="number" id="year" placeholder="Release year">
        <button onclick="searchMovies()">Search</button>
        <div id="results"></div>
    </div>
    <script>
        let token = null;
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            let res = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            if (!res.ok) {
                const formData = new URLSearchParams();
                formData.append('username', username);
                formData.append('password', password);
                res = await fetch('/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: formData
                });
            }
            if (res.ok) {
                const data = await res.json();
                token = data.access_token;
                document.getElementById('login').style.display = 'none';
                document.getElementById('search').style.display = 'block';
                document.getElementById('login_status').innerText = 'Logged in';
            } else {
                document.getElementById('login_status').innerText = 'Login failed';
            }
        }
        async function searchMovies() {
            if (!token) return;
            const params = new URLSearchParams();
            const search = document.getElementById('search_input').value;
            if(search) params.append('search', search);
            const type = document.getElementById('type_filter').value;
            if(type) params.append('type', type);
            const cat = document.getElementById('category').value;
            if(cat) params.append('category', cat);
            const rating = document.getElementById('rating').value;
            if(rating) params.append('rating', rating);
            const year = document.getElementById('year').value;
            if(year) params.append('release_year', year);
            params.append('limit', '20');
            const res = await fetch(`/movies?${params.toString()}`, {
                headers: {'Authorization': `Bearer ${token}`}
            });
            const data = await res.json();
            const container = document.getElementById('results');
            container.innerHTML = `<h3>Found ${data.total} items</h3>`;
            data.items.forEach(m => {
                container.innerHTML += `<div class="movie-item"><b>${m.title}</b> (${m.type})<br>${m.description?.substring(0,150)}...<br>Categories: ${m.categories.map(c=>c.name).join(', ')}<br>Rating: ${m.rating || 'N/A'}</div>`;
            });
        }
    </script>
</body>
</html>
