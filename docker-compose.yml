version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
    command: sh -c "sleep 5 && python -c 'from app.database import engine; from app.models import Base; Base.metadata.create_all(bind=engine); from app.etl import load_csv_to_db; load_csv_to_db(\"netflix.csv\")' && uvicorn app.main:app --host 0.0.0.0 --port 8000"
volumes:
  pgdata: